<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>... | Qui Je Suis</title>
    <link rel="stylesheet" href="./reset.css" />
    <link rel="stylesheet" href="./index.css" />
    <link rel="stylesheet" href="./qui-je-suis.css" />
    <link rel="stylesheet" href="contact.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Give+You+Glory&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../index.css" />
    <link rel="stylesheet" href="../qui-je-suis.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <a href="/"><img src="../assets/images/juno.jpg" alt="" /></a>
        <a href="index.html"
          ><h1>Ju-n0<span>.dev</span></h1></a
        >
        <nav>
          <ul>
            <li><a href="qui-je-suis.html">Qui je suis</a></li>
            <li><a href="realisations.html">Ce que je fais</a></li>
            <li><a href="contact.html">Me contacter</a></li>
          </ul>
        </nav>
      </header>
      <main class="main">
        <div class="contact-form">
          <fieldset class="gender-part">
            <p>Vous êtes ?</p>
            <input type="radio" name="gender" />
            <label for="gender">Une femme</label>

            <input type="radio" name="gender" />
            <label for="gender">Un homme</label>
          </fieldset>

          <fieldset class="details">
            <p>Civilités</p>
            <div>
              <label for="lastname">Nom</label>
              <textarea class="shadow" name="name" cols="30" rows="1"></textarea>
            </div>
            <div>
              <label for="firstname">Prénom</label>
              <textarea class="shadow" name="firstname" cols="30" rows="1"></textarea>
            </div>
          </fieldset>

          <fieldset class="numbers-email">
            <p>Vos coordonnées</p>
            <div>
              <label for="phone-number"> Votre numéro de téléphone</label>
              <input class="shadow" type="tel" name="phone-number" />
            </div>
            <div>
              <label for="email">Votre adresse email</label>
              <input class="shadow" type="email" name="email" />
            </div>
            <div>
              <p>Préférence de contact</p>
              <label>
                <input type="checkbox" name="contact-by-email" value="contact-by-email" />
                Par email
              </label>
              <label>
                <input type="checkbox" name="contact-by-phone" value="contact-by-phone" />
                Par téléphone
              </label>
            </div>
          </fieldset>
        </div>
        <div class="contact-form">
          <fieldset>
            <label class="description-part" for="project-description"
              >Description de votre projet</label
            ><br />
            <textarea
              class="description-area shadow"
              name="project-description"
              cols="30"
              rows="10"
            ></textarea>
          </fieldset>
          <button class="submit-form">Envoyer la demande de contact</button>
        </div>
      </main>
    </div>
  </body>
</html>
